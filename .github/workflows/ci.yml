name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: npm test (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # 零运行时依赖，无需 npm install；npm test = node --test
      - run: npm test
